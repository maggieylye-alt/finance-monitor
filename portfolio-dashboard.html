<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的投资仪表盘 V4</title>
<style>
  :root {
    --bg: #f7f8fa; --card: #ffffff;
    --primary: #1f4e79; --primary-light: #3c6e9c;
    --red: #e84545; --green: #2bb673; --gray: #6b7280;
    --warn: #d97706; --warn-bg: #fff4e5;
    --text: #1f2937; --text-light: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; padding: 14px; font-size: 14px;
  }
  .container { max-width: 1080px; margin: 0 auto; }
  .topbar {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff; padding: 18px 22px; border-radius: 12px;
    margin-bottom: 14px;
  }
  .topbar h1 { font-size: 17px; font-weight: 600; }
  .topbar .meta { font-size: 12px; opacity: 0.85; margin-top: 4px; }
  .topbar .links { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .link {
    color: #fff; text-decoration: none; font-size: 12px; padding: 5px 12px;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 6px;
    background: rgba(255,255,255,0.1);
  }
  .link:hover { background: rgba(255,255,255,0.25); }

  /* KPI */
  .kpi-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px;
  }
  @media (max-width: 720px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--card); padding: 14px; border-radius: 10px; border: 1px solid var(--border);
  }
  .kpi .label { font-size: 11px; color: var(--text-light); }
  .kpi .value { font-size: 20px; font-weight: 600; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .kpi .sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .red { color: var(--red); }
  .green { color: var(--green); }
  .gray { color: var(--gray); }

  /* 15% 进度面板 */
  .progress-panel {
    background: linear-gradient(135deg, #fff8ec, #fff);
    border: 1px solid #fde68a; border-radius: 12px; padding: 18px 22px;
    margin-bottom: 14px;
  }
  .progress-panel h2 {
    font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .progress-bar-wrap {
    background: #f3f4f6; border-radius: 10px; height: 28px; position: relative;
    overflow: hidden; margin-bottom: 10px;
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, var(--green), var(--primary));
    height: 100%; transition: width 0.6s;
  }
  .progress-marks {
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    display: flex; justify-content: space-between; padding: 0 10px;
    align-items: center; font-size: 11px; color: var(--text-light); pointer-events: none;
  }
  .gap-attribution {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
  }
  @media (max-width: 640px) { .gap-attribution { grid-template-columns: 1fr; } }
  .gap-item {
    background: #fff; padding: 8px 10px; border-radius: 6px; font-size: 12px;
    border-left: 3px solid var(--red);
  }
  .gap-item .label { color: var(--text-light); font-size: 11px; }
  .gap-item .value { font-weight: 600; color: var(--red); margin-top: 2px; }

  /* 信号区 */
  .section {
    background: var(--card); padding: 16px 20px; border-radius: 12px;
    margin-bottom: 14px; border: 1px solid var(--border);
  }
  .section h2 {
    font-size: 14px; font-weight: 600; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .section h2 .extra { font-size: 11px; color: var(--text-light); font-weight: 400; }
  .signal-list { list-style: none; }
  .signal-item {
    display: flex; padding: 10px 0; border-bottom: 1px solid var(--border);
    align-items: center; gap: 10px;
  }
  .signal-item:last-child { border: 0; }
  .tag {
    padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 500;
    flex-shrink: 0;
  }
  .tag-high { background: #fee; color: var(--red); }
  .tag-mid { background: #fff4e5; color: var(--warn); }
  .tag-low { background: #ecfdf5; color: var(--green); }
  .signal-msg { font-size: 13px; flex: 1; }
  .signal-empty { padding: 20px; text-align: center; color: var(--text-light); font-size: 13px; }

  /* 板块卡 */
  .sector {
    background: var(--card); border-radius: 10px; padding: 14px 18px;
    margin-bottom: 10px; border: 1px solid var(--border);
  }
  .sector-head {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px;
    margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .sector-head h3 { font-size: 14px; font-weight: 600; }
  .sector-head .mv { font-size: 13px; font-variant-numeric: tabular-nums; }
  .sector-head .pct {
    font-size: 11px; color: var(--text-light);
    background: #f3f4f6; padding: 2px 8px; border-radius: 4px;
  }
  .sector-head .deviation {
    font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
  }
  .deviation.over { background: #fee; color: var(--red); }
  .deviation.under { background: #fff4e5; color: var(--warn); }
  .deviation.ok { background: #ecfdf5; color: var(--green); }
  .sector-head .badge {
    margin-left: auto; padding: 3px 10px; border-radius: 5px; font-size: 11px;
  }
  .badge-hold { background: #ecfdf5; color: var(--green); }
  .badge-take { background: #fff4e5; color: var(--warn); }
  .badge-cut { background: #fee; color: var(--red); }
  .badge-watch { background: #f3f4f6; color: var(--gray); }
  .sector .advice {
    font-size: 12px; color: var(--text-light); padding: 6px 0;
    text-align: left;
  }

  /* 行动清单 */
  .action-row {
    display: flex; padding: 10px 0; border-bottom: 1px solid var(--border);
    gap: 12px; align-items: center; font-size: 13px;
  }
  .action-row:last-child { border: 0; }
  .action-row .priority { padding: 2px 8px; border-radius: 4px; font-size: 11px; flex-shrink: 0; }
  .pri-high { background: #fee; color: var(--red); font-weight: 600; }
  .pri-mid { background: #fff4e5; color: var(--warn); }
  .pri-low { background: #ecfdf5; color: var(--green); }
  .action-row .action { flex: 1; }
  .action-row .amount { color: var(--text); font-variant-numeric: tabular-nums; }

  /* 数据健康 */
  .data-health {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    background: #f9fafb; padding: 10px; border-radius: 8px; font-size: 11px;
  }
  @media (max-width: 640px) { .data-health { grid-template-columns: repeat(2, 1fr); } }
  .data-health .item .label { color: var(--text-light); }
  .data-health .item .value { font-weight: 600; }

  .footer {
    text-align: center; color: var(--text-light); font-size: 11px; padding: 14px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 顶部 -->
  <div class="topbar">
    <h1>我的投资仪表盘 V4</h1>
    <div class="meta" id="meta">加载中...</div>
    <div class="links">
      <a class="link" href="data/portfolio-2026-05-13-corrected.xlsx" download>下载 Excel</a>
      <a class="link" href="data/funds-all-2026-05-13.json" target="_blank">基金 JSON</a>
      <a class="link" href="data/snapshot-2026-05-13.json" target="_blank">今日快照</a>
      <a class="link" href="index.html">历史归档</a>
    </div>
  </div>

  <!-- KPI 4 卡 -->
  <div class="kpi-row" id="kpis"></div>

  <!-- 15% 进度面板 -->
  <div class="progress-panel">
    <h2>
      <span>年度 15% 目标 · 进度</span>
      <span class="extra" id="progress-meta"></span>
    </h2>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      <div class="progress-marks">
        <span>0</span><span>5%</span><span>10%</span><span>15%</span>
      </div>
    </div>
    <div style="font-size:12px; color:var(--text-light); margin-bottom:6px">距 15% 目标的缺口归因:</div>
    <div class="gap-attribution" id="gap-attribution"></div>
  </div>

  <!-- 今日触发信号 -->
  <div class="section">
    <h2>
      <span>今日触发信号</span>
      <span class="extra" id="signals-meta">默认沉默 · 触发才提醒</span>
    </h2>
    <ul class="signal-list" id="signals"></ul>
  </div>

  <!-- 6 大板块 -->
  <div class="section">
    <h2><span>板块持仓 · 偏离目标</span><span class="extra">基于真实金额</span></h2>
    <div id="sectors"></div>
  </div>

  <!-- 本月行动清单 -->
  <div class="section">
    <h2><span>本月行动清单</span><span class="extra">按触发线/纪律</span></h2>
    <div id="actions"></div>
  </div>

  <!-- 数据健康度 -->
  <div class="section">
    <h2><span>数据健康度</span><span class="extra">实时透明披露</span></h2>
    <div class="data-health" id="data-health"></div>
  </div>

  <div class="footer">
    数据源: 腾讯FiT NeoData 实时接口 · 严格按触发线给建议 · 决策权永远在你<br>
    自动化: 14:30 操作建议 · 22:00 净值更新 · 周一09:00 Edge体检 · 月初定投提醒
  </div>
</div>

<script>
(async () => {
  const fmt = n => '¥' + Math.round(n).toLocaleString();
  const fmtPct = n => (n>0?'+':'') + n.toFixed(2) + '%';
  const colorOf = n => n>0 ? 'red' : (n<0 ? 'green' : 'gray');

  const summary = await fetch('data/dashboard-summary-v3.json').then(r=>r.json());

  // 顶部
  const dh = summary.data_health;
  document.getElementById('meta').textContent =
    `${summary.date} · A股${dh.ashare_real}/${dh.ashare_total}实时 · 基金${dh.funds_real}/${dh.funds_total}实时 · 黄金${dh.gold_real?'实时':'缺'}`;

  // KPI
  const totalToday = summary.today_pnl;
  const yp = summary.year_progress;
  const yearPct = yp.annualized_pct;
  const kpis = [
    {label: '总资产', value: fmt(summary.total_capital), sub: '投资+现金', cls: ''},
    {label: '投资仓位', value: fmt(summary.invest_value), sub: `${(summary.invest_value/summary.total_capital*100).toFixed(1)}% (60%目标)`, cls: ''},
    {label: '今日盈亏', value: (totalToday>=0?'+':'')+fmt(totalToday), sub: '基金待22:00更新', cls: colorOf(totalToday)},
    {label: '当前年化', value: fmtPct(yearPct*100), sub: `目标15% · 进度${(yp.progress_to_target*100).toFixed(0)}%`, cls: yearPct>=0.10?'red':'gray'},
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k=>
    `<div class="kpi"><div class="label">${k.label}</div>
     <div class="value ${k.cls||''}">${k.value}</div>
     <div class="sub ${k.cls||''}">${k.sub}</div></div>`
  ).join('');

  // 15% 进度
  const pct = (yp.annualized_pct / 0.15) * 100;
  document.getElementById('progress-bar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('progress-meta').textContent =
    `当前 ${(yp.annualized_pct*100).toFixed(1)}% / 目标 15% · 累计盈亏 ${fmt(yp.absolute_pnl)}`;

  const gap = yp.gap_attribution;
  const gapItems = [
    {label: '黄金超配 36% 拖累', value: fmtPct(gap.gold_overweight*100)},
    {label: '反 Edge 仓位拖累', value: fmtPct(gap.anti_edge_drag*100)},
    {label: '半导体仓位低', value: fmtPct(gap.semiconductor_underweight*100)},
  ];
  document.getElementById('gap-attribution').innerHTML = gapItems.map(g=>
    `<div class="gap-item"><div class="label">${g.label}</div><div class="value">${g.value}</div></div>`
  ).join('');

  // 触发信号
  const sigs = summary.triggered_signals || [];
  document.getElementById('signals-meta').textContent = `共 ${sigs.length} 条`;
  if (sigs.length === 0) {
    document.getElementById('signals').innerHTML = '<li class="signal-empty">今日无触发信号,安心持有</li>';
  } else {
    document.getElementById('signals').innerHTML = sigs.map(s=> {
      const tagCls = s.priority === 'high' ? 'tag-high' : (s.priority === 'mid' ? 'tag-mid' : 'tag-low');
      const tagText = s.priority === 'high' ? '高' : (s.priority === 'mid' ? '中' : '低');
      return `<li class="signal-item"><span class="tag ${tagCls}">${tagText}</span><span class="signal-msg">${s.message}</span></li>`;
    }).join('');
  }

  // 板块
  const sectors = summary.sectors_meta;
  const sectorOrder = ['gold','semiconductor','overseas','new_energy','bond','broad_index','metals','advisory','anti_edge_a_share','hk_other'];
  document.getElementById('sectors').innerHTML = sectorOrder.filter(k=>sectors[k]).map(k => {
    const s = sectors[k];
    const dev = s.deviation;
    const devCls = Math.abs(dev) < 0.02 ? 'ok' : (dev > 0.05 || s.status === 'must_clear' ? 'over' : 'under');
    const badgeCls = s.status === 'must_clear' ? 'badge-cut' : 
                     (s.status === 'overweight' ? 'badge-take' : 
                     (s.status === 'underweight' ? 'badge-watch' : 'badge-hold'));
    const currentPct = (s.current_pct_estimate || 0) * 100;
    const targetPct = (s.target_pct || 0) * 100;
    return `
    <div class="sector">
      <div class="sector-head">
        <h3>${s.label}</h3>
        <span class="pct">${currentPct.toFixed(1)}% → 目标 ${targetPct.toFixed(0)}%</span>
        <span class="deviation ${devCls}">${(dev>0?'+':'')}${(dev*100).toFixed(1)}%</span>
        <span class="badge ${badgeCls}">${s.tag}</span>
      </div>
      <div class="advice">${s.advice}</div>
    </div>`;
  }).join('');

  // 行动清单
  const actions = summary.key_actions || [];
  document.getElementById('actions').innerHTML = actions.map(a => {
    const pri = a.priority === '高' ? 'pri-high' : (a.priority === '中' ? 'pri-mid' : 'pri-low');
    return `
    <div class="action-row">
      <span class="priority ${pri}">${a.priority}</span>
      <span class="action">${a.action}</span>
      <span class="amount">${a.amount === 0 ? '-' : (a.amount > 0 ? '+' : '') + fmt(a.amount)}</span>
    </div>`;
  }).join('');

  // 数据健康
  document.getElementById('data-health').innerHTML = `
    <div class="item"><div class="label">A股实时</div><div class="value">${dh.ashare_real}/${dh.ashare_total}</div></div>
    <div class="item"><div class="label">基金今日</div><div class="value">${dh.funds_real}/${dh.funds_total}</div></div>
    <div class="item"><div class="label">黄金</div><div class="value">${dh.gold_real?'实时':'缺'}</div></div>
    <div class="item"><div class="label">投顾</div><div class="value">周/月披露</div></div>
  `;

})();
</script>
</body>
</html>
