<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的投资仪表盘 V3</title>
<style>
  :root {
    --bg: #f7f8fa; --card: #ffffff;
    --primary: #1f4e79;
    --red: #e84545; --green: #2bb673; --gray: #6b7280;
    --warn: #d97706; --warn-bg: #fff4e5;
    --text: #1f2937; --text-light: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; padding: 14px; font-size: 14px;
  }
  .container { max-width: 1080px; margin: 0 auto; }

  /* 头部 */
  .topbar {
    background: #fff; padding: 14px 18px; border-radius: 10px;
    margin-bottom: 12px; border: 1px solid var(--border);
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
  }
  .topbar h1 { font-size: 15px; font-weight: 600; }
  .topbar .meta { font-size: 11px; color: var(--text-light); }
  .topbar .links { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  .link {
    color: var(--primary); text-decoration: none;
    font-size: 11px; padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 5px;
    background: #f9fafb;
  }
  .link:hover { background: var(--primary); color: #fff; }
  .link.warn { color: var(--warn); border-color: var(--warn); }

  /* 警示横幅 */
  .alert {
    background: var(--warn-bg); border-left: 3px solid var(--warn);
    padding: 10px 14px; border-radius: 6px; margin-bottom: 12px;
    font-size: 12px; color: #78350f;
  }

  /* 顶部 KPI */
  .kpi-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px;
  }
  @media (max-width: 640px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--card); padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--border);
  }
  .kpi .label { font-size: 11px; color: var(--text-light); }
  .kpi .value { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .kpi .sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .red { color: var(--red); }
  .green { color: var(--green); }
  .gray { color: var(--gray); }

  /* 板块卡片 */
  .sector {
    background: var(--card); border-radius: 10px; padding: 16px 18px;
    margin-bottom: 12px; border: 1px solid var(--border);
  }
  .sector-head {
    display: flex; flex-wrap: wrap; align-items: baseline;
    gap: 12px; margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sector-head h2 { font-size: 15px; font-weight: 600; }
  .sector-head .mv { font-size: 13px; color: var(--text); font-variant-numeric: tabular-nums; }
  .sector-head .pct { font-size: 11px; color: var(--text-light); }
  .sector-head .badge {
    margin-left: auto; padding: 3px 10px; border-radius: 5px;
    font-size: 11px; font-weight: 500;
  }
  .badge-hold { background: #ecfdf5; color: var(--green); }
  .badge-take { background: #fff4e5; color: var(--warn); }
  .badge-cut  { background: #fee; color: var(--red); }
  .badge-watch { background: #f3f4f6; color: var(--gray); }

  .sector-body {
    display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 16px;
  }
  @media (max-width: 768px) { .sector-body { grid-template-columns: 1fr; } }
  .sector-section h3 {
    font-size: 12px; font-weight: 500; color: var(--text-light);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .sector-section ul { list-style: none; padding: 0; }
  .sector-section li {
    padding: 5px 0; font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #f3f4f6;
  }
  .sector-section li:last-child { border: 0; }
  .sector-section li .name { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sector-section li .pct { font-variant-numeric: tabular-nums; font-size: 12px; margin-left: 8px; }

  .news-item { font-size: 12px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
  .news-item:last-child { border: 0; }
  .news-item .title { color: var(--text); line-height: 1.4; }
  .news-item .meta { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  .advice-box {
    background: #f9fafb; border-radius: 6px; padding: 10px;
    font-size: 12px; line-height: 1.6;
  }
  .advice-box .head { color: var(--text-light); font-size: 11px; margin-bottom: 4px; }
  .advice-box ul { list-style: none; padding: 0; }
  .advice-box li { padding: 3px 0; color: var(--text); }
  .advice-box li::before { content: "·"; margin-right: 6px; color: var(--text-light); }

  .data-status {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; margin-left: 6px;
  }
  .ds-real { background: #ecfdf5; color: var(--green); }
  .ds-fallback { background: #fff4e5; color: var(--warn); }
  .ds-missing { background: #f3f4f6; color: var(--gray); }

  .footer {
    text-align: center; color: var(--text-light); font-size: 11px; padding: 16px;
  }
</style>
</head>
